spring:
  datasource:
    url: jdbc:h2:mem:liftlogai;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  sql:
    init:
      mode: always

liftlog:
  auth:
    token-secret: test-secret-with-at-least-thirty-two-characters
    cookie-secure: true
